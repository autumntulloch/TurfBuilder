services:

  frontend:
    container_name: turfbuilder_app
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '5173:5173'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:db_password@postgres:5432/postgres
      - BETTER_AUTH_SECRET=ODiDH4PwSD2KxDoVu7jVfkxooICq5m1P # DO NOT USE IN PRODUCTION! THIS SECRET IS PUBLIC AND ONLY FOR DEV USE!
      - BETTER_AUTH_URL=http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    restart: unless-stopped
  nats:
    image: nats:2.10
    container_name: nats-turfbuilder
    restart: unless-stopped
    command: [
      "-js",
      "-m", "8222",
      "--store_dir", "/data/jetstream"
    ]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # monitoring
    volumes:
      - nats_data:/data/jetstream
volumes:
  nats_data:
